<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Black rounded background -->
  <rect width="128" height="128" rx="24" fill="#1a1a1a"/>

  <!-- Rainbow ring -->
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00f" />
      <stop offset="16%"  stop-color="#0ff" />
      <stop offset="33%"  stop-color="#0f0" />
      <stop offset="50%"  stop-color="#ff0" />
      <stop offset="66%"  stop-color="#f80" />
      <stop offset="83%"  stop-color="#f00" />
      <stop offset="100%" stop-color="#f0f" />
    </linearGradient>
  </defs>

  <circle cx="64" cy="64" r="48"
        fill="none" stroke="url(#rainbow)" stroke-width="8"/>

  <!-- Orange I in the center -->
  <rect x="54" y="36" width="20" height="56" rx="2" fill="#e8963a"/>
</svg>
