name: Build Iron

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            cmake \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            jq

      - name: Clear cargo cache
        run: rm -rf ~/.cargo/registry ~/.cargo/git target

      - name: Check (release)
        id: check_release
        run: |
          set -o pipefail
          cargo check --release 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | tee build.log
        shell: bash

      - name: Build (release)
        if: success() && (github.ref == 'refs/heads/main' && github.event_name != 'pull_request')
        id: build_release
        run: |
          set -o pipefail
          CARGO_BUILD_JOBS=2 cargo build --release 2>&1 | tee -a build.log
        shell: bash

      - name: Build (debug, PRs only)
        if: success() && github.event_name == 'pull_request'
        id: build_debug
        run: cargo build --verbose

      - name: Verify binary
        if: steps.build_release.outcome == 'success'
        id: verify
        run: |
          SIZE=$(stat -c%s target/release/iron)
          echo "Binary size: $SIZE bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "ERROR: Binary too small ($SIZE bytes), likely a cache or build issue"
            exit 1
          fi

      - name: Upload artifact
        if: steps.build_release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: iron-build
          path: target/release/iron
          if-no-files-found: error
          retention-days: 30

      - name: Compute new tag
        if: steps.build_release.outcome == 'success'
        id: tag
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=$(echo "$PREV_TAG" | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1 | sed 's/^0*//')
          MINOR=$(echo "$VERSION" | cut -d. -f2 | sed 's/^0*//')
          PATCH=$(echo "$VERSION" | cut -d. -f3 | sed 's/^0*//')
          [ -z "$MAJOR" ] && MAJOR=0
          [ -z "$MINOR" ] && MINOR=0
          [ -z "$PATCH" ] && PATCH=0
          while git rev-parse "v${MAJOR}.${MINOR}.${PATCH}" >/dev/null 2>&1; do
            PATCH=$((10#$PATCH + 1))
          done
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml version
        if: steps.build_release.outcome == 'success'
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          VERSION="${NEW_TAG#v}"
          awk -F'= ' '/^\[package\]/{p=1} p && /^version/{gsub(/"[^"]+"/,"\"'"$VERSION"'\""); p=0} 1' Cargo.toml > tmp && mv tmp Cargo.toml
          git add Cargo.toml
          git config --global user.email "iron-bot@akinus21.com"
          git config --global user.name "Iron Bot"
          git commit -m "chore: bump version to ${VERSION}"

      - name: Tag and create GitHub release with binary
        if: steps.build_release.outcome == 'success'
        id: release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.email "iron-bot@akinus21.com"
          git config --global user.name "Iron Bot"

          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          BINARY="target/release/iron"

          if [ ! -s "$BINARY" ]; then
            echo "ERROR: Binary missing or empty at $BINARY"
            exit 1
          fi

          SHA256=$(sha256sum "$BINARY" | awk '{print $1}')
          SIZE=$(stat -c%s "$BINARY")
          echo "Binary size: $SIZE bytes"
          echo "SHA256: $SHA256"

          if [ "$SIZE" -lt 100000 ]; then
            echo "ERROR: Binary too small"
            exit 1
          fi

          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "" \
            "$BINARY#iron"

          ASSET_COUNT=$(gh release view "$NEW_TAG" --json assets --jq '.assets | length')
          echo "Assets uploaded: $ASSET_COUNT"
          if [ "$ASSET_COUNT" -lt 1 ]; then
            echo "ERROR: No assets found on release after upload"
            exit 1
          fi

          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Update homebrew tap
        if: steps.build_release.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config --global user.email "iron-bot@akinus21.com"
          git config --global user.name "Iron Bot"

          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          SHA256="${{ steps.release.outputs.sha256 }}"
          BINARY_URL="https://github.com/Akinus21/Iron/releases/download/${NEW_TAG}/iron"

          TAP_REPO="Akinus21/homebrew-tap"
          TAP_DIR="/tmp/homebrew-tap"

          if ! gh repo view "$TAP_REPO" >/dev/null 2>&1; then
            echo "Creating homebrew-tap repo $TAP_REPO..."
            gh repo create "$TAP_REPO" --public --description "Homebrew core formulas for Akinus21 projects"
          fi

          if [ -d "$TAP_DIR" ]; then
            cd "$TAP_DIR"
            git pull origin main
          else
            git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" "$TAP_DIR"
            cd "$TAP_DIR"
          fi

          mkdir -p Formula

          printf 'class Iron < Formula\n' > Formula/iron.rb
          printf '  desc "GTK4 keyboard-driven web browser for BlueAK"\n' >> Formula/iron.rb
          printf '  homepage "https://github.com/Akinus21/Iron"\n' >> Formula/iron.rb
          printf '  version "%s"\n' "${NEW_TAG#v}" >> Formula/iron.rb
          printf '  url "%s"\n' "${BINARY_URL}" >> Formula/iron.rb
          printf '  sha256 "%s"\n' "${SHA256}" >> Formula/iron.rb
          printf '  depends_on "gtk4"\n' >> Formula/iron.rb
          printf '  depends_on "libadwaita"\n' >> Formula/iron.rb
          printf '  depends_on "webkitgtk"\n' >> Formula/iron.rb
          printf '\n' >> Formula/iron.rb
          printf '  def install\n' >> Formula/iron.rb
          printf '    bin.install "iron"\n' >> Formula/iron.rb
          printf '\n' >> Formula/iron.rb
          printf '    (share/"applications").mkpath\n' >> Formula/iron.rb
          printf '    (share/"applications"/"org.blueak.iron.desktop").write <<~DESKTOP\n' >> Formula/iron.rb
          printf '[Desktop Entry]\n' >> Formula/iron.rb
          printf 'Type=Application\n' >> Formula/iron.rb
          printf 'Name=Iron\n' >> Formula/iron.rb
          printf 'Comment=GTK4 keyboard-driven web browser for BlueAK\n' >> Formula/iron.rb
          printf 'Exec=iron %%u\n' >> Formula/iron.rb
          printf 'Icon=org.blueak.iron\n' >> Formula/iron.rb
          printf 'Categories=Network;WebBrowser;\n' >> Formula/iron.rb
          printf 'MimeType=text/html;text/xml;application/xhtml+xml;x-scheme-handler/http;x-scheme-handler/https;\n' >> Formula/iron.rb
          printf 'StartupNotify=true\n' >> Formula/iron.rb
          printf 'Terminal=false\n' >> Formula/iron.rb
          printf 'DESKTOP\n' >> Formula/iron.rb
          printf '  end\n' >> Formula/iron.rb
          printf '\n' >> Formula/iron.rb
          printf '  test do\n' >> Formula/iron.rb
          printf '    assert_match "iron", shell_output("#{bin}/iron --version 2>&1 || true")\n' >> Formula/iron.rb
          printf '  end\n' >> Formula/iron.rb
          printf 'end\n' >> Formula/iron.rb

          git add Formula/iron.rb
          git commit -m "Update iron to ${NEW_TAG}" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Notify webhook on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$SHA" 2>/dev/null || echo "unknown")
          ERRORS=$(cat build.log 2>/dev/null | jq -Rs . || echo '""')

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg errors "$ERRORS" \
            '{run_url:$run_url,sha:$sha,commit_msg:$commit_msg,ref:$ref,actor:$actor,errors:$errors}')

          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print "sha256="$2}')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/iron-build" || true

      - name: Notify webhook on success
        if: steps.build_release.outcome == 'success'
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$SHA" 2>/dev/null || echo "unknown")

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{event:"build_success",run_url:$run_url,sha:$sha,commit_msg:$commit_msg,ref:$ref,actor:$actor}')

          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print "sha256="$2}')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/iron-build" || true
